<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lil Noah and the Zombie Horde</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">

    <section id="intro-screen">
        <div id="intro-stage">
            <img id="intro-image" src="images/intro_background.png">

            <img class="fog-overlay fog-one" src="images/fog_overlay.png">
            <img class="fog-overlay fog-two" src="images/fog_overlay.png">
            <img class="fog-overlay fog-three" src="images/fog_overlay.png">

            <img id="bat-overlay" src="images/bat_overlay.png">

            <img class="lightning-overlay lightning-one" src="images/lightning_overlay.png">
            <img class="lightning-overlay lightning-two" src="images/lightning_overlay.png">
            <img class="lightning-overlay lightning-three" src="images/lightning_overlay.png">

            <button id="start-click-area" aria-label="Press Start"></button>
        </div>
    </section>

    <section id="scene-screen">
        <main id="scene-container">
            <img id="scene-image" src="" alt="Scene image">
            <div id="story-box"></div>
            <div id="choices"></div>
        </main>
    </section>

    <section id="death-screen">
        <div id="death-box">
            <h1>YOU DIED</h1>
            <p id="death-count"></p>
            <p id="penis-status"></p>
            <p id="death-tip"></p>
            <button id="restart-button">START OVER</button>
        </div>
    </section>

</div>

<script src="script.js"></script>
</body>
</html>
